name: Feature request
description: Suggest an improvement or new capability for the admin shell
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the feature and why it would help people using ZenPanel.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Who is affected?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How you imagine this working in the UI shell.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about (optional).
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This fits a UI shell (no full backend/auth product required)
          required: false
        - label: I am willing to help implement this
          required: false
