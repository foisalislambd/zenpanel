name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cli:
    name: Build create-zenpanel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build CLI
        run: npm run build

      - name: Typecheck CLI
        run: npm run typecheck

  nextjs-template:
    name: Build Next.js template
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/create-zenpanel/templates/nextjs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/create-zenpanel/templates/nextjs/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  react-template:
    name: Build React (Vite) template
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/create-zenpanel/templates/react
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/create-zenpanel/templates/react/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

  preact-template:
    name: Build Preact (Vite) template
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/create-zenpanel/templates/preact
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/create-zenpanel/templates/preact/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

  solid-template:
    name: Build Solid (Vite) template
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/create-zenpanel/templates/solid
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/create-zenpanel/templates/solid/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

  svelte-template:
    name: Build Svelte (Vite) template
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/create-zenpanel/templates/svelte
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/create-zenpanel/templates/svelte/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

  vue-template:
    name: Build Vue (Vite) template
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/create-zenpanel/templates/vue
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/create-zenpanel/templates/vue/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

  html-template:
    name: Install HTML template
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/create-zenpanel/templates/html
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/create-zenpanel/templates/html/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Verify admin pages exist
        run: test -f src/admin/login.html && test -f src/admin/index.html && test -f src/js/config.js

  astro-template:
    name: Build Astro template
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/create-zenpanel/templates/astro
