      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/create-zenpanel/templates/astro/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

  angular-template:
    name: Build Angular template
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/create-zenpanel/templates/angular
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/create-zenpanel/templates/angular/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
