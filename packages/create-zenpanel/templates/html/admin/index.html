<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — ZenPanel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css" />
    <script src="https://unpkg.com/lucide@0.511.0/dist/umd/lucide.min.js"></script>
  </head>
  <body class="admin-shell">
    <div id="layout-root"></div>
    <div id="page-content" hidden>
      <h1 class="page-title">Dashboard</h1>
      <p class="muted" style="margin:-1rem 0 1.5rem">Welcome back — preview metrics for your admin shell.</p>
      <div class="stats-grid" id="stats"></div>
      <div style="display:grid;gap:1.25rem;margin-top:1.25rem" class="dash-grid">
        <div class="admin-card">
          <div style="padding:1rem 1.25rem;border-bottom:1px solid var(--gray-200);font-weight:600;font-size:0.875rem">Recent orders</div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>Order</th><th>Customer</th><th>Amount</th><th>Status</th></tr>
              </thead>
              <tbody id="orders-body"></tbody>
            </table>
          </div>
        </div>
        <div class="admin-card">
          <div style="padding:1rem 1.25rem;border-bottom:1px solid var(--gray-200);font-weight:600;font-size:0.875rem">Recent users</div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>Name</th><th>Email</th><th>Provider</th><th>Joined</th></tr>
              </thead>
              <tbody id="users-body"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
    <script type="module">
      import { mountAdminLayout } from "/js/layout.js";
      import { previewStats, previewOrders, previewUsers } from "/js/data.js";

      mountAdminLayout({ title: "Dashboard" });

      const stats = document.getElementById("stats");
      const items = [
        ["Total users", previewStats.totalUsers],
        ["Revenue", `$${previewStats.totalRevenue.toLocaleString()}`],
        ["Orders (7d)", previewStats.newOrdersLast7Days],
        ["Unread messages", previewStats.unreadMessages],
      ];
      stats.innerHTML = items
        .map(
          ([label, value]) =>
            `<div class="admin-card admin-card-body stat-card"><h3>${label}</h3><p>${value}</p></div>`,
        )
        .join("");

      document.getElementById("orders-body").innerHTML = previewOrders
        .map(
          (o) =>
            `<tr><td>${o.id}</td><td>${o.customer}</td><td>${o.amount}</td><td>${o.status}</td></tr>`,
        )
        .join("");

      document.getElementById("users-body").innerHTML = previewUsers
        .map(
          (u) =>
            `<tr><td>${u.name}</td><td>${u.email}</td><td>${u.provider}</td><td>${u.joined}</td></tr>`,
        )
        .join("");
    </script>
    <style>
      @media (min-width: 1024px) {
        .dash-grid { grid-template-columns: 1fr 1fr; }
      }
    </style>
  </body>
</html>
